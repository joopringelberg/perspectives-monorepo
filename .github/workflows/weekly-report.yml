# .github/workflows/weekly-report.yml
name: Weekly Progress Report

on:
  schedule:
    # Every Friday at 16:00 UTC
    - cron: '0 16 * * 5'
  workflow_dispatch: # Manual trigger

jobs:
  create-report-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Get merged PRs from last week
        id: get-prs
        uses: actions/github-script@v7
        with:
          script: |
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });
            
            const mergedPRs = prs.filter(pr => 
              pr.merged_at && 
              new Date(pr.merged_at) > oneWeekAgo
            );
            
            let prList = mergedPRs.map(pr => 
              `- [#${pr.number}](${pr.html_url}): ${pr.title} (@${pr.user.login})`
            ).join('\n');
            
            if (prList === '') {
              prList = '- No PRs merged this week';
            }
            
            core.setOutput('pr_list', prList);
          
      - name: Create report issue
        uses: actions/github-script@v7
        with:
          script: |
            const prList = `${{ steps.get-prs.outputs.pr_list }}`;
            const weekNumber = new Date().toISOString().slice(0, 10);
            
            const body = `# Weekly Progress Report

## Merged Pull Requests (Last 7 Days)

${prList}

---

@copilot Please analyze these merged PRs and create a management-level progress report covering:

1. **Key achievements** this week
2. **Features added** or **bugs fixed**
3. **Impact** on the project
4. **Notable patterns** or concerns
5. **Recommended focus areas** for next week

Please provide a concise summary suitable for management review.`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Progress Report - ${weekNumber}`,
              body: body,
              assignees: ['copilot'],
              labels: ['report', 'automated']
            });