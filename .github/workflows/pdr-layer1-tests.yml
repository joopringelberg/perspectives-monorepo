name: PDR Layer 1 tests

# Layer 1 = pure PureScript unit tests:
#   - ARC expression parser
#   - ArrayT combinators
#   - ADT algebra (DisjunctiveNormalForm, SpecialisesADT, ADT2)
#   - ARC parser phases 1–3 (in-memory AST transformations)
#   - Query description compiler (in-memory DomeinFile cache)
#
# No CouchDB, no RabbitMQ, no browser required.

on:
  push:
    paths:
      - 'packages/perspectives-core/test/Layer1.purs'
      - 'packages/perspectives-core/test/expressionParser.purs'
      - 'packages/perspectives-core/test/arrayT.purs'
      - 'packages/perspectives-core/test/incomingPost.purs'
      - 'packages/perspectives-core/test/queryComparisonOperators.purs'
      - 'packages/perspectives-core/test/abstractDataTypeTests.purs'
      - 'packages/perspectives-core/test/arcParser.purs'
      - 'packages/perspectives-core/test/arcParserPhaseTwo.purs'
      - 'packages/perspectives-core/test/arcParserPhaseThree.purs'
      - 'packages/perspectives-core/test/arcParserModel.purs'
      - 'packages/perspectives-core/test/descriptionCompiler.purs'
      - 'packages/perspectives-core/test/arcAstSelectors.purs'
      - 'packages/perspectives-core/test/domeinFileSelectors.purs'
      - 'packages/perspectives-core/test/utils.purs'
      - 'packages/perspectives-core/src/arcParser/**'
      - 'packages/perspectives-core/src/core/amqpTransport/incomingPost.purs'
      - 'packages/perspectives-core/src/core/instances/arrayTransformer.purs'
      - 'packages/perspectives-core/src/core/instances/combinators.purs'
      - 'packages/perspectives-core/src/core/queries/expressionCompiler.purs'
      - 'packages/perspectives-core/src/core/queries/unsafeCompiler.purs'
      - 'packages/perspectives-core/src/core/computedValues/externalCoreModules.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/abstractDataType2.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/conjunctiveNormalForm.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/expandedADT.purs'
      - 'packages/perspectives-core/src/core/typePersistence/**'
      - 'packages/perspectives-core/src/core/queries/**'
      - 'packages/perspectives-core/src/model/**'
      - 'packages/perspectives-apitypes/src/**'
      - 'packages/perspectives-utilities/src/**'
      - 'packages/purescript-avar-monadask/src/**'
      - 'packages/purescript-lru-cache/src/**'
      - 'packages/serialisable-nonempty-arrays/src/**'
      - 'packages/perspectives-core/spago.yaml'
      - 'packages/perspectives-core/spago.lock'
      - '.github/workflows/pdr-layer1-tests.yml'
  pull_request:
    paths:
      - 'packages/perspectives-core/test/Layer1.purs'
      - 'packages/perspectives-core/test/expressionParser.purs'
      - 'packages/perspectives-core/test/arrayT.purs'
      - 'packages/perspectives-core/test/incomingPost.purs'
      - 'packages/perspectives-core/test/queryComparisonOperators.purs'
      - 'packages/perspectives-core/test/abstractDataTypeTests.purs'
      - 'packages/perspectives-core/test/arcParser.purs'
      - 'packages/perspectives-core/test/arcParserPhaseTwo.purs'
      - 'packages/perspectives-core/test/arcParserPhaseThree.purs'
      - 'packages/perspectives-core/test/arcParserModel.purs'
      - 'packages/perspectives-core/test/descriptionCompiler.purs'
      - 'packages/perspectives-core/test/arcAstSelectors.purs'
      - 'packages/perspectives-core/test/domeinFileSelectors.purs'
      - 'packages/perspectives-core/test/utils.purs'
      - 'packages/perspectives-core/src/arcParser/**'
      - 'packages/perspectives-core/src/core/amqpTransport/incomingPost.purs'
      - 'packages/perspectives-core/src/core/instances/arrayTransformer.purs'
      - 'packages/perspectives-core/src/core/instances/combinators.purs'
      - 'packages/perspectives-core/src/core/queries/**'
      - 'packages/perspectives-core/src/core/computedValues/externalCoreModules.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/abstractDataType2.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/conjunctiveNormalForm.purs'
      - 'packages/perspectives-core/src/core/typerepresentation/expandedADT.purs'
      - 'packages/perspectives-core/src/core/typePersistence/**'
      - 'packages/perspectives-core/src/model/**'
      - 'packages/perspectives-apitypes/src/**'
      - 'packages/perspectives-utilities/src/**'
      - 'packages/purescript-avar-monadask/src/**'
      - 'packages/purescript-lru-cache/src/**'
      - 'packages/serialisable-nonempty-arrays/src/**'
      - 'packages/perspectives-core/spago.yaml'
      - 'packages/perspectives-core/spago.lock'
      - '.github/workflows/pdr-layer1-tests.yml'
  workflow_dispatch:

jobs:
  layer1-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.6.4'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install PureScript toolchain
        run: |
          npm install -g purescript@0.15.15 spago@0.93.44 purs-tidy

      - name: Cache spago packages
        uses: actions/cache@v4
        with:
          path: |
            packages/perspectives-core/.spago
            ~/.spago
          key: spago-${{ runner.os }}-${{ hashFiles('packages/perspectives-core/spago.lock') }}
          restore-keys: spago-${{ runner.os }}-

      - name: Install npm dependencies
        run: pnpm install

      - name: Build PureScript (perspectives-core + local deps)
        working-directory: packages/perspectives-core
        run: pnpm exec spago build

      - name: Run Layer 1 tests
        working-directory: packages/perspectives-core
        run: pnpm run test:layer1
